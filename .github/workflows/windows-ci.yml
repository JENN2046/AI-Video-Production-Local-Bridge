name: Windows CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  FFMPEG_VERSION: "8.1.2"

jobs:
  quality-and-integration:
    name: Quality and integration
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install pinned FFmpeg
        shell: pwsh
        run: |
          winget install --id Gyan.FFmpeg --version $env:FFMPEG_VERSION --exact --source winget --accept-package-agreements --accept-source-agreements --disable-interactivity
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $root = Join-Path $env:LOCALAPPDATA "Microsoft\WinGet\Packages"
          $ffmpeg = Get-ChildItem -Path $root -Recurse -Filter ffmpeg.exe -ErrorAction Stop |
            Where-Object { $_.FullName -like "*Gyan.FFmpeg*" } |
            Select-Object -First 1
          if (-not $ffmpeg) { throw "Pinned FFmpeg executable was not found after installation." }

          $bin = $ffmpeg.Directory.FullName
          $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "FFMPEG_PATH=$($ffmpeg.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FFPROBE_PATH=$(Join-Path $bin 'ffprobe.exe')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify runtime versions
        shell: pwsh
        run: |
          node --version
          npm --version
          ffmpeg -version | Select-Object -First 1
          ffprobe -version | Select-Object -First 1

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Workbench V2 domain tests
        run: npm run test:v2

      - name: Workbench V2 UI tests
        run: npm run test:v2:ui

      - name: WebGPT V4 integration tests
        run: npm run test:webgpt:v4

      - name: H1 Workbench tests
        run: npm run test:h1

      - name: Legacy archive integrity
        run: npm run test:legacy

      - name: Secret scan
        run: npm run secret:scan

  browser-smoke:
    name: Browser smoke
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run browser smoke tests
        run: npm run test:v2:browser

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
